name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix:
    name: nix (x86_64-linux)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CACHIX_CACHE: ${{ vars.CACHIX_CACHE }}
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Configure Cachix (pull-only)
        if: ${{ env.CACHIX_CACHE != '' && env.CACHIX_AUTH_TOKEN == '' }}
        uses: cachix/cachix-action@v17
        with:
          name: ${{ env.CACHIX_CACHE }}
          extraPullNames: nix-community
          skipPush: true

      - name: Configure Cachix (push-enabled)
        if: ${{ env.CACHIX_CACHE != '' && env.CACHIX_AUTH_TOKEN != '' }}
        uses: cachix/cachix-action@v17
        with:
          name: ${{ env.CACHIX_CACHE }}
          authToken: ${{ env.CACHIX_AUTH_TOKEN }}
          extraPullNames: nix-community

      - name: Run flake checks
        run: perl -e 'alarm 900; exec @ARGV' -- nix flake check --print-build-logs

      - name: Build coverage artifact
        run: nix build .#checks.x86_64-linux.coverage --print-build-logs

      - name: Export coverage artifact
        run: cp -R result/ coverage-artifact/

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: cl-dataflow-coverage-x86_64-linux
          path: coverage-artifact/
          if-no-files-found: error
