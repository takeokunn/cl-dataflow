name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify tag matches system version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          asd_version="$(sed -n 's/^[[:space:]]*:version[[:space:]]*"\([^"]*\)".*/\1/p' cl-dataflow.asd | head -n1)"
          if [ "$tag" != "$asd_version" ]; then
            echo "Tag $GITHUB_REF_NAME (=$tag) does not match cl-dataflow.asd :version $asd_version" >&2
            exit 1
          fi

      - name: Extract release notes from CHANGELOG
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG section found for $version" >&2
            exit 1
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md \
            --verify-tag
